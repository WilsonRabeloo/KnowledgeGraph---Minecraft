        <script type="text/javascript">

              function drawGraph() {
                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#97c2fc", "id": "item_001", "image": "icons/madeira.png", "label": "madeira", "shape": "image", "size": 30, "title": "Tipo: bloco"}, {"color": "#97c2fc", "id": "item_002", "image": "icons/tabua.png", "label": "tabua", "shape": "image", "size": 30, "title": "Tipo: bloco"}, {"color": "#97c2fc", "id": "item_003", "image": "icons/graveto.png", "label": "graveto", "shape": "image", "size": 30, "title": "Tipo: recurso"}, {"color": "#97c2fc", "id": "item_004", "image": "icons/picareta_de_madeira.png", "label": "picareta_de_madeira", "shape": "image", "size": 30, "title": "Tipo: ferramenta"}, {"color": "#97c2fc", "id": "item_005", "image": "icons/pedra.png", "label": "pedra", "shape": "image", "size": 30, "title": "Tipo: bloco"}, {"color": "#97c2fc", "id": "item_006", "image": "icons/pedregulho.png", "label": "pedregulho", "shape": "image", "size": 30, "title": "Tipo: bloco"}, {"color": "#97c2fc", "id": "item_007", "image": "icons/picareta_de_pedra.png", "label": "picareta_de_pedra", "shape": "image", "size": 30, "title": "Tipo: ferramenta"}, {"color": "#97c2fc", "id": "item_008", "image": "icons/fornalha.png", "label": "fornalha", "shape": "image", "size": 30, "title": "Tipo: bloco"}]);

                  nodeColors = {};

                  var options = {

};
